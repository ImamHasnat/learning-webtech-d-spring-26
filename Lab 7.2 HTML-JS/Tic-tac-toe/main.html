<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 30px;
        }

        .score-item {
            background: #f0f0f0;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
        }

        .score-item .label {
            color: #666;
            font-size: 0.9em;
            display: block;
            margin-bottom: 5px;
        }

        .score-item .value {
            font-size: 2em;
            color: #667eea;
        }

        .status {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 20px;
            height: 30px;
            color: #333;
        }

        .status.x-turn {
            color: #3498db;
        }

        .status.o-turn {
            color: #e74c3c;
        }

        .status.winner {
            color: #27ae60;
            font-size: 1.8em;
        }

        .status.draw {
            color: #f39c12;
            font-size: 1.8em;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            grid-gap: 5px;
            margin-bottom: 30px;
            background: #667eea;
            padding: 5px;
            border-radius: 8px;
        }

        .cell {
            width: 120px;
            height: 120px;
            background: white;
            border: none;
            font-size: 2.5em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            color: #333;
        }

        .cell:hover:not(.taken):not(.winner) {
            background: #f0f0f0;
            transform: scale(1.05);
        }

        .cell.taken {
            cursor: not-allowed;
        }

        .cell.x {
            color: #3498db;
        }

        .cell.o {
            color: #e74c3c;
        }

        .cell.winner {
            background: #27ae60;
            color: white;
            font-weight: bold;
            animation: pulse 0.6s ease-in-out;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        @keyframes slideIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .cell.marked {
            animation: slideIn 0.3s ease-out;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tic-Tac-Toe</h1>
        
        <div class="score-board">
            <div class="score-item">
                <span class="label">Player X Wins</span>
                <span class="value" id="scoreX">0</span>
            </div>
            <div class="score-item">
                <span class="label">Draws</span>
                <span class="value" id="scoreDraw">0</span>
            </div>
            <div class="score-item">
                <span class="label">Player O Wins</span>
                <span class="value" id="scoreO">0</span>
            </div>
        </div>

        <div class="status" id="status">Player X's Turn</div>

        <div class="game-board" id="gameBoard">
            <button class="cell" data-index="0"></button>
            <button class="cell" data-index="1"></button>
            <button class="cell" data-index="2"></button>
            <button class="cell" data-index="3"></button>
            <button class="cell" data-index="4"></button>
            <button class="cell" data-index="5"></button>
            <button class="cell" data-index="6"></button>
            <button class="cell" data-index="7"></button>
            <button class="cell" data-index="8"></button>
        </div>

        <button id="resetBtn">Reset Game</button>
    </div>

    <script>
        // Game state variables
        let gameBoard = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X';
        let gameActive = true;
        let scoreX = 0;
        let scoreO = 0;
        let scoreDraw = 0;

        // Winning combinations
        const winningConditions = [
            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8],
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8],
            [0, 4, 8],
            [2, 4, 6]
        ];

        // Get DOM elements
        const cells = document.querySelectorAll('.cell');
        const statusDisplay = document.getElementById('status');
        const resetBtn = document.getElementById('resetBtn');
        const scoreXDisplay = document.getElementById('scoreX');
        const scoreODisplay = document.getElementById('scoreO');
        const scoreDrawDisplay = document.getElementById('scoreDraw');

        // Initialize game
        function initializeGame() {
            gameBoard = ['', '', '', '', '', '', '', '', ''];
            currentPlayer = 'X';
            gameActive = true;
            updateStatus();
            
            cells.forEach(cell => {
                cell.textContent = '';
                cell.classList.remove('x', 'o', 'taken', 'winner', 'marked');
            });
        }

        // Update status display
        function updateStatus() {
            if (!gameActive) {
                const winner = checkWinner();
                if (winner) {
                    statusDisplay.textContent = `🎉 Player ${winner} Wins! 🎉`;
                    statusDisplay.className = 'status winner';
                } else {
                    statusDisplay.textContent = "It's a Draw!";
                    statusDisplay.className = 'status draw';
                }
            } else {
                statusDisplay.textContent = `Player ${currentPlayer}'s Turn`;
                statusDisplay.className = `status ${currentPlayer.toLowerCase()}-turn`;
            }
        }

        // Check for winner
        function checkWinner() {
            for (let condition of winningConditions) {
                const [a, b, c] = condition;
                if (gameBoard[a] && gameBoard[a] === gameBoard[b] && gameBoard[a] === gameBoard[c]) {
                    // Highlight winning cells
                    cells[a].classList.add('winner');
                    cells[b].classList.add('winner');
                    cells[c].classList.add('winner');
                    return gameBoard[a];
                }
            }
            return null;
        }

        // Check for draw
        function checkDraw() {
            return gameBoard.every(cell => cell !== '');
        }

        // Handle cell click
        function handleCellClick(e) {
            const cell = e.target;
            const index = cell.getAttribute('data-index');

            // Prevent clicking if cell is already filled or game is over
            if (gameBoard[index] !== '' || !gameActive) {
                return;
            }

            // Mark the cell
            gameBoard[index] = currentPlayer;
            cell.textContent = currentPlayer;
            cell.classList.add(currentPlayer.toLowerCase(), 'taken', 'marked');

            // Check for winner
            if (checkWinner()) {
                gameActive = false;
                if (currentPlayer === 'X') {
                    scoreX++;
                    scoreXDisplay.textContent = scoreX;
                } else {
                    scoreO++;
                    scoreODisplay.textContent = scoreO;
                }
                updateStatus();
                return;
            }

            // Check for draw
            if (checkDraw()) {
                gameActive = false;
                scoreDraw++;
                scoreDrawDisplay.textContent = scoreDraw;
                updateStatus();
                return;
            }

            // Switch player
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            updateStatus();
        }

        // Event listeners
        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
        resetBtn.addEventListener('click', initializeGame);

        // Start game
        initializeGame();
    </script>
</body>
</html>
